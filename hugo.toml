baseURL = 'https://kimtks456.github.io/'
languageCode = 'ko-kr'
title = 'San Kim의 위키' # 원하는 이름으로 변경
theme = 'hugo-book'

# 모든 .Date / .Lastmod 를 KST로 해석·출력
timeZone = 'Asia/Seoul'

# git repo에 첫 commit이 생긴 뒤 enableGitInfo = true 를 켜면
# .Lastmod 가 git 마지막 commit 시점으로 자동 설정됩니다.
enableGitInfo = true

# .Date / .Lastmod 결정 우선순위
#  - date:    front matter의 date가 없으면 파일 수정시간으로 fallback
#  - lastmod: front matter > (git) > 파일 수정시간 > date
[frontmatter]
  date = ["date", ":fileModTime"]
  lastmod = ["lastmod", ":git", ":fileModTime", "date"]

# 휴고북 기본 세팅
[params]
  BookLogo = '' # 로고 이미지 경로 (없으면 비워둠)
  BookTheme = 'auto' # 다크모드 자동
  # `[text](./foo.md)` 형식의 상대 .md 링크를 실제 페이지 URL 로 자동 변환.
  # "warning" 으로 두면 깨진 링크가 빌드 로그에 경고로 뜸. true / "error" 도 가능.
  BookPortableLinks = "warning"

# 모든 하위 페이지에 bookCollapseSection 주입 (leaf page는 layouts override에서 차단)
[[cascade]]
  bookCollapseSection = true

# ToC 에 포함할 heading 깊이
#   startLevel = 1  →  #  (h1) 부터 포함
#   endLevel   = 4  →  #### (h4) 까지 포함. 더 깊이 원하면 5 또는 6.
#[markup]
#  [markup.tableOfContents]
#    startLevel = 1
#    endLevel = 4
#    ordered = false